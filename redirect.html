<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      color: #ff4444;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div id="message">Redirecting...</div>
  </div>

  <script type="module">
    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
    const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;

    async function redirect() {
      try {
        const path = window.location.pathname;
        const code = path.split('/r/')[1];

        if (!code) {
          document.getElementById('message').innerHTML = '<div class="error">Invalid shortlink</div>';
          setTimeout(() => window.location.href = '/', 2000);
          return;
        }

        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/shortlinks?short_code=eq.${code}&is_active=eq.true&select=original_url`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          }
        );

        const data = await response.json();

        if (!data || data.length === 0) {
          document.getElementById('message').innerHTML = '<div class="error">Shortlink not found<br>Redirecting to home...</div>';
          setTimeout(() => window.location.href = '/', 2000);
          return;
        }

        fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_click_count`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ shortlink_code: code })
        }).catch(() => {});

        window.location.replace(data[0].original_url);
      } catch (error) {
        console.error('Redirect error:', error);
        document.getElementById('message').innerHTML = '<div class="error">Error occurred<br>Redirecting to home...</div>';
        setTimeout(() => window.location.href = '/', 2000);
      }
    }

    redirect();
  </script>
</body>
</html>
